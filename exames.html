<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EXAMES — Passados</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- Google Font (consistente com MATHX) -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        /* ============================================================
           EXAMES — ESTILOS
           Tema: escuro com azul/ouro
           ============================================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', 'Segoe UI', system-ui, sans-serif;
            background: #0a0e1a;
            color: #e8eaf6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }

        /* HEADER */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 0 2rem;
            border-bottom: 1px solid rgba(79, 163, 255, 0.1);
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo span:first-child {
            color: #4fa3ff;
        }

        .logo span:last-child {
            color: #ff7b2c;
        }

        .badge {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(79, 163, 255, 0.5);
            border: 1px solid rgba(79, 163, 255, 0.15);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }

        .btn-voltar {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a0a0b0;
            padding: 0.5rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-voltar:hover {
            background: rgba(79, 163, 255, 0.08);
            border-color: rgba(79, 163, 255, 0.2);
            color: #4fa3ff;
        }

        /* TÍTULO */
        .hero {
            text-align: center;
            padding: 2rem 0 1.5rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #4fa3ff 0%, #ff7b2c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: rgba(255, 255, 255, 0.35);
            font-size: 1rem;
            margin-top: 0.3rem;
        }

        /* DISCIPLINAS */
        .disciplinas {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 2rem;
        }

        .disciplinas button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #a0a0b0;
            padding: 0.6rem 1.4rem;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Space Grotesk', sans-serif;
        }

        .disciplinas button:hover {
            border-color: rgba(79, 163, 255, 0.3);
            color: #e8eaf6;
        }

        .disciplinas button.ativo {
            border-color: #4fa3ff;
            background: rgba(79, 163, 255, 0.12);
            color: #4fa3ff;
        }

        /* ANOS */
        .anos {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .anos button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #6a7a8a;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Space Grotesk', sans-serif;
        }

        .anos button:hover {
            border-color: rgba(255, 123, 44, 0.3);
            color: #e8eaf6;
        }

        .anos button.ativo {
            border-color: #ff7b2c;
            background: rgba(255, 123, 44, 0.1);
            color: #ff7b2c;
        }

        .anos button.indisponivel {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .anos button.indisponivel:hover {
            border-color: rgba(255, 255, 255, 0.06);
            color: #6a7a8a;
        }

        /* LISTA DE EXAMES */
        .exames-lista {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
        }

        .exame-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 1rem 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .exame-card:hover {
            border-color: rgba(79, 163, 255, 0.2);
            background: rgba(255, 255, 255, 0.04);
        }

        .exame-card .topo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .exame-card .titulo {
            font-weight: 600;
            font-size: 1rem;
            color: #e8eaf6;
        }

        .exame-card .titulo i {
            margin-right: 0.5rem;
            color: #ff7b2c;
        }

        .exame-card .epoca {
            font-size: 0.7rem;
            color: #4fa3ff;
            background: rgba(79, 163, 255, 0.08);
            padding: 0.2rem 0.8rem;
            border-radius: 12px;
            font-weight: 600;
        }

        .exame-card .status {
            font-size: 0.75rem;
            color: #6a7a8a;
        }

        .exame-card .status.disponivel {
            color: #4CAF50;
        }

        .exame-card .status.indisponivel {
            color: #6a7a8a;
        }

        /* VISUALIZADOR */
        .visualizador {
            display: none;
            margin-top: 2rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 1.5rem;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        .visualizador.active {
            display: block;
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .visualizador .voltar-visualizador {
            background: none;
            border: none;
            color: #6a7a8a;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: 'Space Grotesk', sans-serif;
            margin-bottom: 1rem;
            transition: color 0.3s ease;
        }

        .visualizador .voltar-visualizador:hover {
            color: #e8eaf6;
        }

        .visualizador .imagem-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .visualizador .imagem-container .bloco {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 0.5rem;
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
        }

        .visualizador .imagem-container .bloco .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6a7a8a;
            margin-bottom: 0.5rem;
            padding: 0 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .visualizador .imagem-container .bloco .btn-download {
            background: rgba(79, 163, 255, 0.12);
            border: 1px solid rgba(79, 163, 255, 0.2);
            color: #4fa3ff;
            padding: 0.2rem 0.8rem;
            border-radius: 6px;
            font-size: 0.65rem;
            cursor: pointer;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }

        .visualizador .imagem-container .bloco .btn-download:hover {
            background: rgba(79, 163, 255, 0.2);
            border-color: rgba(79, 163, 255, 0.4);
        }

        .visualizador .imagem-container img {
            width: 100%;
            max-height: 700px;
            object-fit: contain;
            border-radius: 6px;
            background: #0a0e1a;
            display: block;
        }

        .visualizador .imagem-container .sem-imagem {
            color: #6a7a8a;
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
        }

        /* FOOTER */
        .footer {
            text-align: center;
            padding: 3rem 1rem 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            margin-top: 3rem;
            color: rgba(255, 255, 255, 0.06);
            font-size: 0.7rem;
            letter-spacing: 1px;
        }

        /* RESPONSIVO */
        @media (max-width: 600px) {
            .container {
                padding: 1rem;
            }

            .hero h1 {
                font-size: 1.8rem;
            }

            .exame-card {
                padding: 0.8rem 1rem;
            }

            .exame-card .topo {
                flex-direction: column;
                align-items: flex-start;
            }

            .disciplinas button {
                padding: 0.4rem 1rem;
                font-size: 0.75rem;
            }

            .anos button {
                padding: 0.3rem 0.8rem;
                font-size: 0.7rem;
            }

            .visualizador {
                padding: 1rem;
            }

            .visualizador .imagem-container img {
                max-height: 400px;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(79, 163, 255, 0.15);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(79, 163, 255, 0.25);
        }

        ::selection {
            background: rgba(79, 163, 255, 0.15);
            color: #fff;
        }
        /* ─── MASCOTE EXAMBOT — RGB + Óculos ─── */
.mascote-container {
  position: fixed;
  bottom: 30px;
  left: 30px;
  z-index: 9999;
  pointer-events: none;
  width: 100px;
  height: 100px;
}

.mascote-body {
  width: 90px;
  height: 90px;
  background: linear-gradient(145deg, #1a1a2e, #0a0a14);
  border-radius: 50%;
  border: 3px solid #4fa3ff;
  box-shadow: 0 8px 25px rgba(79, 163, 255, 0.3);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: floatMascote 3s ease-in-out infinite;
}

.mascote-body::before,
.mascote-body::after {
  content: '';
  position: absolute;
  top: -20px;
  width: 3px;
  height: 20px;
  background: #4fa3ff;
  border-radius: 2px;
}

.mascote-body::before {
  left: 25px;
}

.mascote-body::after {
  right: 25px;
}

.mascote-antena {
  position: absolute;
  top: -25px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  animation: piscaAntena 1.5s ease-in-out infinite;
}

.mascote-antena-left {
  left: 21px;
  background: #ff7b2c;
  box-shadow: 0 0 15px rgba(255, 123, 44, 0.5);
}

.mascote-antena-right {
  right: 21px;
  background: #4fa3ff;
  box-shadow: 0 0 15px rgba(79, 163, 255, 0.5);
}

/* ─── ÓCULOS RGB ─── */
.mascote-oculos {
  position: absolute;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 4px;
  z-index: 5;
  width: 70px;
  height: 32px;
}

.oculos-lente {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 3px solid #4fa3ff;
  background: rgba(79, 163, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  animation: rgbGlow 2s ease-in-out infinite;
}

.oculos-lente-left {
  transform: rotate(-5deg);
  animation-delay: 0s;
}

.oculos-lente-right {
  transform: rotate(5deg);
  animation-delay: 0.7s;
}

.oculos-ponte {
  width: 8px;
  height: 3px;
  background: #ff7b2c;
  border-radius: 2px;
  flex-shrink: 0;
  animation: rgbPonte 2s ease-in-out infinite;
}

.oculos-haste {
  position: absolute;
  width: 16px;
  height: 3px;
  background: #4fa3ff;
  top: 12px;
  animation: rgbHaste 2s ease-in-out infinite;
}

.oculos-haste-left {
  right: 100%;
  margin-right: 2px;
  transform: rotate(-12deg);
  transform-origin: right center;
  animation-delay: 0.3s;
}

.oculos-haste-right {
  left: 100%;
  margin-left: 2px;
  transform: rotate(12deg);
  transform-origin: left center;
  animation-delay: 1s;
}

/* ─── RGB ANIMATION (LEVE) ─── */
@keyframes rgbGlow {
  0% {
    border-color: #4fa3ff;
    box-shadow: 0 0 20px rgba(79, 163, 255, 0.2);
  }
  33% {
    border-color: #ff7b2c;
    box-shadow: 0 0 20px rgba(255, 123, 44, 0.2);
  }
  66% {
    border-color: #a855f7;
    box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
  }
  100% {
    border-color: #4fa3ff;
    box-shadow: 0 0 20px rgba(79, 163, 255, 0.2);
  }
}

@keyframes rgbPonte {
  0% {
    background: #4fa3ff;
  }
  33% {
    background: #ff7b2c;
  }
  66% {
    background: #a855f7;
  }
  100% {
    background: #4fa3ff;
  }
}

@keyframes rgbHaste {
  0% {
    background: #a855f7;
  }
  33% {
    background: #4fa3ff;
  }
  66% {
    background: #ff7b2c;
  }
  100% {
    background: #a855f7;
  }
}

/* ─── OLHOS ─── */
.mascote-eye {
  width: 14px;
  height: 14px;
  background: #0a0e1a;
  border-radius: 50%;
  border: 2px solid #4fa3ff;
  position: relative;
  overflow: hidden;
  animation: rgbEye 2s ease-in-out infinite;
}

.mascote-pupil {
  width: 6px;
  height: 6px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: all 0.05s linear;
  animation: rgbPupil 2s ease-in-out infinite;
}

.oculos-lente .mascote-eye {
  border: none;
  width: 18px;
  height: 18px;
}

.oculos-lente .mascote-pupil {
  width: 7px;
  height: 7px;
}

@keyframes rgbEye {
  0% {
    border-color: #4fa3ff;
  }
  33% {
    border-color: #ff7b2c;
  }
  66% {
    border-color: #a855f7;
  }
  100% {
    border-color: #4fa3ff;
  }
}

@keyframes rgbPupil {
  0% {
    background: #4fa3ff;
  }
  33% {
    background: #ff7b2c;
  }
  66% {
    background: #a855f7;
  }
  100% {
    background: #4fa3ff;
  }
}

/* ─── BOCA ─── */
.mascote-mouth {
  width: 18px;
  height: 8px;
  border-bottom: 3px solid #4fa3ff;
  border-radius: 0 0 20px 20px;
  margin-top: 6px;
  transition: all 0.3s ease;
  animation: rgbMouth 2s ease-in-out infinite;
}

@keyframes rgbMouth {
  0% {
    border-color: #4fa3ff;
  }
  33% {
    border-color: #ff7b2c;
  }
  66% {
    border-color: #a855f7;
  }
  100% {
    border-color: #4fa3ff;
  }
}

.mascote-container.happy .mascote-mouth {
  width: 22px;
  height: 12px;
  border-bottom: 4px solid #ffd700;
  border-radius: 0 0 30px 30px;
  animation: none;
}

.mascote-container.happy .oculos-lente {
  border-color: #ffd700;
  background: rgba(255, 215, 0, 0.15);
  box-shadow: 0 0 30px rgba(255, 215, 0, 0.25);
  animation: none;
}

.mascote-container.happy .mascote-eye {
  border-color: #ffd700;
  animation: none;
}

.mascote-container.happy .mascote-pupil {
  background: #ffd700;
  animation: none;
}

.mascote-container.happy .mascote-mouth {
  border-color: #ffd700;
}

/* ─── LABEL ─── */
.mascote-label {
  position: absolute;
  bottom: -30px;
  background: rgba(0, 0, 0, 0.7);
  color: #4fa3ff;
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 700;
  border: 1px solid #1e2d50;
  white-space: nowrap;
  animation: rgbLabel 2s ease-in-out infinite;
}

@keyframes rgbLabel {
  0% {
    color: #4fa3ff;
    border-color: #4fa3ff;
  }
  33% {
    color: #ff7b2c;
    border-color: #ff7b2c;
  }
  66% {
    color: #a855f7;
    border-color: #a855f7;
  }
  100% {
    color: #4fa3ff;
    border-color: #4fa3ff;
  }
}

.mascote-glow {
  position: absolute;
  top: -5px;
  width: 15px;
  height: 15px;
  border-radius: 50%;
  animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
  0% {
    opacity: 0.5;
    transform: scale(1);
    background: radial-gradient(circle, rgba(79, 163, 255, 0.3), transparent);
  }
  33% {
    background: radial-gradient(circle, rgba(255, 123, 44, 0.3), transparent);
  }
  66% {
    background: radial-gradient(circle, rgba(168, 85, 247, 0.3), transparent);
  }
  100% {
    opacity: 0.5;
    transform: scale(1);
    background: radial-gradient(circle, rgba(79, 163, 255, 0.3), transparent);
  }
}

/* ─── ANIMAÇÕES ─── */
@keyframes floatMascote {
  0%,
  100% {
    transform: translateY(0px);
  }
  50% {
    transform: translateY(-8px);
  }
}

@keyframes piscaAntena {
  0%,
  100% {
    opacity: 1;
    transform: scale(1);
  }
  50% {
    opacity: 0.3;
    transform: scale(0.7);
  }
}

@media (max-width: 600px) {
  .mascote-container {
    width: 80px;
    height: 80px;
    bottom: 15px;
    left: 15px;
  }
  .mascote-body {
    width: 70px;
    height: 70px;
  }
  .mascote-oculos {
    top: 22px;
    width: 55px;
    height: 26px;
  }
  .oculos-lente {
    width: 22px;
    height: 22px;
  }
  .oculos-lente .mascote-eye {
    width: 14px;
    height: 14px;
  }
  .oculos-lente .mascote-pupil {
    width: 5px;
    height: 5px;
  }
  .oculos-haste {
    width: 12px;
    height: 2px;
    top: 10px;
  }
  .mascote-label {
    font-size: 9px;
    bottom: -25px;
  }
}
    </style>
</head>
<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">
            <div class="header-left">
                <span class="logo"><span>EXA</span><span>MES</span></span>
                <span class="badge">Passados • 2020-2025</span>
            </div>
            <a href="index.html" class="btn-voltar">
                <i class="fas fa-arrow-left"></i> Voltar ao MATHX
            </a>
        </header>

        <!-- HERO -->
        <section class="hero">
            <h1>📝 Exames Passados</h1>
            <p>Escolhe a disciplina e o ano para visualizar</p>
        </section>

        <!-- DISCIPLINAS -->
        <div class="disciplinas" id="disciplinas">
            <button class="ativo" data-disc="fisica">⚡ Física</button>
            <button data-disc="matematica">📐 Matemática</button>
            <button data-disc="quimica">🧪 Química</button>
            <button data-disc="biologia">🧬 Biologia</button>
            <button data-disc="historia">📜 História</button>
            <button data-disc="geografia">🌍 Geografia</button>
            <button data-disc="filosofia">🧠 Filosofia</button>
        </div>

        <!-- ANOS -->
        <div class="anos" id="anos">
            <button class="ativo" data-ano="2025">2025</button>
            <button data-ano="2024">2024</button>
            <button data-ano="2023">2023</button>
            <button data-ano="2022">2022</button>
            <button data-ano="2021">2021</button>
            <button data-ano="2020" class="indisponivel">2020</button>
        </div>

        <!-- LISTA DE EXAMES -->
        <div class="exames-lista" id="examesLista"></div>

        <!-- VISUALIZADOR -->
        <div class="visualizador" id="visualizador">
            <button class="voltar-visualizador" onclick="fecharVisualizador()">
                <i class="fas fa-arrow-left"></i> Voltar à lista
            </button>
            <div class="imagem-container" id="imagemContainer"></div>
        </div>

        <!-- FOOTER -->
        <footer class="footer">
            EXAMES — Passados • MATHX Ecosystem
        </footer>

    </div>

            const disciplina = dadosExames[disciplinaAtual];

            const anos = disciplina.anos;
            const epocas = anos[anoAtual]?.epocas || {};

            const epocasKeys = Object.keys(epocas);
            const nomesEpocas = {
                '1a': '1ª Chamada',
                '2a': '2ª Chamada',
                'rec': 'Recorrência'
            };

            if (epocasKeys.length === 0) {
                examesLista.innerHTML =
                    '<div style="text-align:center;color:#6a7a8a;padding:2rem;">Nenhum exame disponível para este ano.</div>';
                return;
            }

            let html = '';
            epocasKeys.forEach(function(key) {
                const epoca = epocas[key];
                const temConteudo = epoca.enunciado || (epoca.extra && epoca.extra.length > 0);
                const statusClass = temConteudo ? 'disponivel' : 'indisponivel';
                const statusText = temConteudo ? '✅ Disponível' : '⏳ Em breve';

                html += `
                        <div class="exame-card" onclick="${temConteudo ? 'abrirVisualizador(\'' + disciplinaAtual + '\', \'' + anoAtual + '\', \'' + key + '\')' : ''}" style="${!temConteudo ? 'opacity:0.5;cursor:not-allowed;' : ''}">

                                <span class="titulo"><i class="fas ${disciplina.icone}"></i> ${disciplina.nome} — ${anoAtual}</span>
                                <span class="epoca">${nomesEpocas[key] || key}</span>
                                <span class="status ${statusClass}">${statusText}</span>
                            </div>
                        </div>
                    `;
            });

            examesLista.innerHTML = html;
        }

        function downloadImagem(src, nome) {
            fetch(src)
                .then(function(response) { return response.blob(); })
                .then(function(blob) {
                    var link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = nome || 'imagem.jpg';
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);
                })
                .catch(function() {
                    // Fallback: abrir em nova aba
                    window.open(src, '_blank');
                });
        }

        function abrirVisualizador(disciplina, ano, epoca) {
            const dados = dadosExames[disciplina];
            if (!dados) return;

            const epocaData = dados.anos[ano]?.epocas[epoca];
            if (!epocaData) return;

            const temEnunciado = epocaData.enunciado;
            const temExtra = epocaData.extra && epocaData.extra.length > 0;

            if (!temEnunciado && !temExtra) return;

            let html = '';
            let contador = 1;

            // Enunciado
            if (temEnunciado) {
                const nomeFicheiro = epocaData.enunciado.split('/').pop();
                html += `
                        <div class="bloco">
                            <div class="label">
                                <span>📄 Enunciado</span>
                                <button class="btn-download" onclick="downloadImagem('${epocaData.enunciado}', '${disciplina}_${ano}_${epoca}_enunciado.jpg')">
                                    <i class="fas fa-download"></i> Baixar
                                </button>
                            </div>
                            <img src="${epocaData.enunciado}" alt="Enunciado" onerror="this.style.display='none'">
                        </div>
                    `;
                contador++;
            }

            // Extra (outras imagens)
            if (temExtra) {
                epocaData.extra.forEach(function(img) {
                    if (img) {
                        const nomeFicheiro = img.split('/').pop();
                        html += `
                            <div class="bloco">
                                <div class="label">
                                    <span>📎 Continuação ${contador > 1 ? contador : ''}</span>
                                    <button class="btn-download" onclick="downloadImagem('${img}', '${disciplina}_${ano}_${epoca}_parte${contador}.jpg')">
                                        <i class="fas fa-download"></i> Baixar
                                    </button>
                                </div>
                                <img src="${img}" alt="Continuação" onerror="this.style.display='none'">
                            </div>
                        `;
                        contador++;
                    }
                });
            }

            if (!html) {
                html = '<div class="sem-imagem">Nenhuma imagem disponível para este exame.</div>';
            }

            imagemContainer.innerHTML = html;
            visualizador.classList.add('active');
            visualizador.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function fecharVisualizador() {
            visualizador.classList.remove('active');
            setTimeout(function() {
                imagemContainer.innerHTML = '';
            }, 400);
        }

        function trocarDisciplina(disciplina) {
            disciplinaAtual = disciplina;
            disciplinasBtns.forEach(function(btn) {
                btn.classList.toggle('ativo', btn.dataset.disc === disciplina);

document.addEventListener('DOMContentLoaded', function() {
  var mascote = document.getElementById('mascote');
  if (!mascote) return;

  var pupilLeft = document.getElementById('pupil-left');
  var pupilRight = document.getElementById('pupil-right');

  var targetX = window.innerWidth / 2;
  var targetY = window.innerHeight / 2;
  var isHappy = false;

  function updateMascote() {
    var dx = (targetX - window.innerWidth / 2) * 0.03;
    var dy = (targetY - window.innerHeight / 2) * 0.03;

    if (pupilLeft && pupilRight) {
      pupilLeft.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
      pupilRight.style.transform = 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px))';
    }
    requestAnimationFrame(updateMascote);
  }

  document.addEventListener('mousemove', function(e) {
    targetX = e.clientX;
    targetY = e.clientY;
  });

  document.addEventListener('touchmove', function(e) {
    var touch = e.touches[0];
    if (touch) {
      targetX = touch.clientX;
      targetY = touch.clientY;
    }
  }, { passive: true });

  document.addEventListener('click', function() {
    if (!isHappy) {
      mascote.classList.add('happy');
      isHappy = true;
      mascote.style.transform = 'scale(1.2)';
      setTimeout(function() {
        mascote.style.transform = 'scale(1)';
        setTimeout(function() {
          mascote.classList.remove('happy');
          isHappy = false;
        }, 600);
      }, 150);
    }
  });

  document.addEventListener('touchstart', function() {
    if (!isHappy) {
      mascote.classList.add('happy');
      isHappy = true;
      mascote.style.transform = 'scale(1.2)';
      setTimeout(function() {
        mascote.style.transform = 'scale(1)';
        setTimeout(function() {
          mascote.classList.remove('happy');
          isHappy = false;
        }, 600);
      }, 150);
    }
  }, { passive: true });

  updateMascote();
});
